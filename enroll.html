<header class="text-center py-5 mt-5 bg-light">
  <h1>Course Enrollment</h1>
  <p>Fill in your details to enroll</p>
</header>

<main class="container py-5">
<form id="enrollForm" class="p-4 bg-white rounded shadow-sm">
  <div class="mb-3">
    <label for="name" class="form-label">Full Name</label>
    <input type="text" id="name" class="form-control" required minlength="3">
  </div>
  <div class="mb-3">
    <label for="email" class="form-label">Email</label>
    <input type="email" id="email" class="form-control" required>
  </div>
  <div class="mb-3">
    <label for="phone" class="form-label">Phone</label>
    <input type="tel" id="phone" class="form-control" pattern="[0-9]{10}" required>
  </div>
  <div class="mb-3">
    <label for="course" class="form-label">Select Course</label>
    <select id="course" class="form-select" required>
      <option value="">-- Choose --</option>
      <option>Java Programming</option>
      <option>Python Development</option>
      <option>Full Stack Development</option>
      <option>React JS</option>
      <option>Data Structures & Algorithms</option>
      <option>AI & Mathematics</option>
      <option>Communication Skills</option>
      <option>Backend Development</option>
      <option>CSS & Responsive Design</option>
      <option>HTML Fundamentals</option>
      <option>JavaScript Essentials</option>
      <option>Interview Preparation</option>
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">Mode of Learning</label><br>
    <input type="radio" name="mode" value="Online" required> Online
    <input type="radio" name="mode" value="Offline" class="ms-3"> Offline
  </div>
  <div class="mb-3">
    <label for="date" class="form-label">Preferred Start Date</label>
    <input type="date" id="date" class="form-control" required>
  </div>
  <div class="mb-3">
    <label for="comments" class="form-label">Comments</label>
    <textarea id="comments" class="form-control"></textarea>
  </div>
  <div class="mb-3 form-check">
    <input type="checkbox" id="terms" class="form-check-input" required>
    <label for="terms" class="form-check-label">Agree to terms</label>
  </div>
  <button type="submit" class="btn btn-primary">Enroll Now</button>
  <p id="formMessage" class="mt-2 text-success"></p>
</form>
</main>
